<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0f1a; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .tooltip-container { position: relative; }
        .tooltip-box {
            position: absolute; bottom: calc(100% + 12px); left: 50%; transform: translateX(-50%);
            opacity: 0; pointer-events: none; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            z-index: 50; width: 320px;
        }
        .tooltip-box::after {
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            border: 8px solid transparent; border-top-color: rgba(59,130,246,0.3);
        }
        .tooltip-box.visible { opacity: 1; pointer-events: auto; }
        .hoverable { cursor: pointer; transition: all 0.2s ease; position: relative; }
        .hoverable:hover { outline: 2px solid rgba(59,130,246,0.5); outline-offset: 2px; }
        .hoverable:hover .tooltip-box { opacity: 1; }
        .category-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .cat-audio { background: rgba(59,130,246,0.2); color: #93c5fd; }
        .cat-dev { background: rgba(34,197,94,0.2); color: #86efac; }
        .cat-creative { background: rgba(236,72,153,0.2); color: #f9a8d4; }
        .cat-browser { background: rgba(234,179,8,0.2); color: #fde047; }
        .cat-terminal { background: rgba(168,85,247,0.2); color: #d8b4fe; }
        .glow-blue { box-shadow: 0 0 30px rgba(59,130,246,0.15), inset 0 0 30px rgba(59,130,246,0.05); }
        .app-tab { transition: all 0.2s ease; }
        .app-tab.active { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.5); color: #93c5fd; }
        .knob { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #374151, #1f2937); border: 2px solid #4b5563; cursor: pointer; position: relative; transition: all 0.2s ease; }
        .knob::after { content: ''; position: absolute; top: 4px; left: 50%; transform: translateX(-50%); width: 2px; height: 12px; background: #9ca3af; border-radius: 1px; }
        .knob:hover { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59,130,246,0.3); }
        .slider-track { width: 100%; height: 6px; background: #1f2937; border-radius: 3px; position: relative; }
        .slider-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 3px; }
        .slider-thumb { width: 16px; height: 16px; border-radius: 50%; background: white; position: absolute; top: 50%; transform: translateY(-50%); box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .waveform { display: flex; align-items: end; gap: 2px; height: 40px; }
        .waveform-bar { width: 3px; background: linear-gradient(to top, #3b82f6, #8b5cf6); border-radius: 1px; transition: height 0.3s ease; }
        .spectrum { display: flex; align-items: end; gap: 1px; height: 40px; }
        .spectrum-bar { width: 6px; border-radius: 2px 2px 0 0; transition: height 0.3s ease; }
        .code-line { padding: 2px 0; }
        .code-line .keyword { color: #c084fc; }
        .code-line .string { color: #86efac; }
        .code-line .comment { color: #6b7280; }
        .code-line .number { color: #fbbf24; }
        .code-line .function { color: #60a5fa; }
    </style>
</head>

let currentApp = 'ableton';

function switchApp(appName) {
    currentApp = appName;
    const app = APPS[appName];
    document.getElementById('window-title').textContent = app.title;
    document.getElementById('app-content').innerHTML = app.content;

    document.querySelectorAll('.app-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.app === appName);
    });

    // Attach hover listeners
    document.querySelectorAll('.hoverable[data-tooltip]').forEach(el => {
        el.addEventListener('mouseenter', showTooltip);
        el.addEventListener('mouseleave', hideTooltip);
    });
}

function showTooltip(e) {
    const key = e.currentTarget.dataset.tooltip;
    const data = TOOLTIPS[key];
    if (!data) return;

    // Remove existing tooltip
    document.querySelectorAll('.tooltip-box').forEach(t => t.remove());

    const app = APPS[currentApp];
    const box = document.createElement('div');
    box.className = 'tooltip-box';
    box.innerHTML = `
        <div class="bg-gradient-to-br from-[#1e293b] to-[#0f172a] border border-${app.color}/30 rounded-xl p-4 shadow-2xl">
            <div class="flex items-center gap-2 mb-2">
                <span class="category-badge cat-${app.category}">${app.categoryLabel}</span>
                <span class="text-xs text-gray-400">${data.title}</span>
            </div>
            <p class="text-sm text-gray-300 mb-3 leading-relaxed">${data.desc}</p>
            <div class="flex items-center gap-4 text-xs text-gray-500 border-t border-white/5 pt-2">
                <span>&#9733; ${data.gesture}</span>
                <span>&#128161; ${data.tip}</span>
            </div>
        </div>
    `;

    const rect = e.currentTarget.getBoundingClientRect();
    const container = e.currentTarget.closest('.lg\\:col-span-3') || document.body;
    const containerRect = container.getBoundingClientRect();

    box.style.left = (rect.left - containerRect.left + rect.width / 2) + 'px';
    box.style.top = (rect.top - containerRect.top) + 'px';
    box.style.transform = 'translateX(-50%) translateY(-100%)';
    box.classList.add('visible');

    container.style.position = 'relative';
    container.appendChild(box);
}

function hideTooltip() {
    document.querySelectorAll('.tooltip-box').forEach(t => t.remove());
}

// Init
switchApp('ableton');

// Animate waveform
function animateWaveform() {
    document.querySelectorAll('.waveform-bar').forEach(bar => {
        bar.style.height = (Math.random() * 30 + 10) + 'px';
    });
}
setInterval(animateWaveform, 500);
